name: Build and Deploy to Production

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/velo-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          request_pty: true
          command_timeout: 180s
          script: |
            echo "=========================================="
            echo "🚀 DEPLOYMENT STARTED"
            echo "=========================================="
            echo "⏰ Time: $(date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "📦 Image: ghcr.io/velocouriersvc/velo-backend:latest"
            echo ""

            # ── Step 1: Pre-deploy status ──
            echo "── PRE-DEPLOY STATUS ──"
            sudo kubectl -n velo get pods -l app=velo-api -o wide
            echo ""

            # ── Step 2: Restart deployment ──
            echo "── RESTARTING DEPLOYMENT ──"
            sudo kubectl -n velo rollout restart deployment/velo-api

            # ── Step 3: Wait for rollout ──
            echo "── WAITING FOR ROLLOUT (timeout: 120s) ──"
            if sudo kubectl -n velo rollout status deployment/velo-api --timeout=120s; then
              echo ""
              echo "── POST-DEPLOY STATUS ──"
              sudo kubectl -n velo get pods -l app=velo-api -o wide
              echo ""

              # ── Step 4: Health check ──
              echo "── HEALTH CHECK ──"
              sleep 5
              HEALTH=$(sudo kubectl -n velo exec deploy/velo-api -- wget -qO- http://localhost:3000/health 2>/dev/null || echo "UNREACHABLE")
              echo "Health endpoint: $HEALTH"
              echo ""

              # ── Step 5: Recent logs ──
              echo "── RECENT LOGS (last 30 lines) ──"
              sudo kubectl -n velo logs deploy/velo-api --tail=30
              echo ""
              echo "=========================================="
              echo "✅ DEPLOYMENT SUCCESSFUL"
              echo "=========================================="
            else
              echo ""
              echo "=========================================="
              echo "❌ ROLLOUT FAILED — COLLECTING DIAGNOSTICS"
              echo "=========================================="

              echo ""
              echo "── POD STATUS ──"
              sudo kubectl -n velo get pods -l app=velo-api -o wide
              echo ""

              echo "── POD DESCRIPTIONS ──"
              sudo kubectl -n velo describe pods -l app=velo-api | tail -60
              echo ""

              echo "── POD LOGS (last 50 lines) ──"
              sudo kubectl -n velo logs deploy/velo-api --tail=50 --all-containers=true
              echo ""

              echo "── EVENTS ──"
              sudo kubectl -n velo get events --sort-by='.lastTimestamp' | tail -20
              echo ""

              echo "=========================================="
              echo "❌ DEPLOYMENT FAILED"
              echo "=========================================="
              exit 1
            fi

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Author** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Image** | \`ghcr.io/velocouriersvc/velo-backend:latest\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Author** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the **Deploy to VPS** step logs above for full diagnostics." >> $GITHUB_STEP_SUMMARY
          fi