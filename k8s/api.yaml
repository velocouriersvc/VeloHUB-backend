# Velo API Services
# The Deployment lives in velo-prod-deployment.yaml
# This file only defines the Services that expose the API pods.

---
# Internal ClusterIP service (used by other pods inside the cluster)
apiVersion: v1
kind: Service
metadata:
  name: velo-api-service
  namespace: velo
spec:
  selector:
    app: velo-api
  ports:
    - port: 3000
      targetPort: 3000

---
# NodePort to expose API externally (Nginx on the host proxies to this)
apiVersion: v1
kind: Service
metadata:
  name: velo-api-nodeport
  namespace: velo
spec:
  type: NodePort
  # Pin each client IP to one pod so the socket.io HTTP-polling fallback (multiple
  # requests per session) always lands on the pod that owns the session.
  sessionAffinity: ClientIP
  selector:
    app: velo-api
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
