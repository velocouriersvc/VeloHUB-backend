# ⚠️  DO NOT commit this file with real values.
# Copy to secrets.prod.yaml, fill in base64-encoded values, apply, then delete the file from disk.
#
# To encode: echo -n "your-value" | base64
# To decode: echo "base64string" | base64 -d

apiVersion: v1
kind: Secret
metadata:
  name: velo-secrets
  namespace: velo
type: Opaque
data:
  # Database
  DB_PASSWORD: cG9zdGdyZXM=            # "postgres" — CHANGE THIS

  # Supabase migration: full connection string (includes credentials → keep here, not in ConfigMap).
  # Leave EMPTY while on Contabo (empty = falls back to DB_HOST/DB_PORT/etc).
  # At cutover, base64-encode the Supabase session-pooler URL and put it here:
  #   echo -n 'postgresql://postgres.<ref>:<pw>@aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require' | base64 -w0
  DATABASE_URL: ""

  # API
  API_KEY: Y2hhbmdlLW1l              # "change-me" — CHANGE THIS

  # Paystack
  PAYSTACK_SECRET_KEY: ""

  # Stripe
  STRIPE_SECRET_KEY: ""               # Set on VPS via kubectl — DO NOT put real values here
  STRIPE_PUBLISHABLE_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""

  # Google Maps
  GOOGLE_MAPS_API_KEY: ""

  # Twilio
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_PHONE_NUMBER: ""
  TWILIO_VERIFY_SERVICE_SID: ""

  # MinIO
  MINIO_ROOT_USER: dmVsby1hZG1pbg==    # "velo-admin"
  MINIO_ROOT_PASSWORD: Y2hhbmdlLW1l    # "change-me" — CHANGE THIS
