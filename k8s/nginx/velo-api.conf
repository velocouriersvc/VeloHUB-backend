# Nginx reverse proxy for Velo Backend API
# Domain: api.velocouriersvc.com → K3s NodePort 30080
#
# Place at: /etc/nginx/sites-available/api.velocouriersvc.com
# Symlink:  ln -s /etc/nginx/sites-available/api.velocouriersvc.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.velocouriersvc.com;

    location / {
        proxy_pass http://127.0.0.1:30080;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # File uploads (matches Multer 10MB limit + headroom)
        client_max_body_size 15M;
    }
}

# ── Certbot will auto-add the HTTPS server block after you run: ──
# sudo certbot --nginx -d api.velocouriersvc.com
