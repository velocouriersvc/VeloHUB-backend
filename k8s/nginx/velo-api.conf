# Nginx config for Velo Backend
# Place at: /etc/nginx/sites-available/velo-api
# Symlink:  ln -s /etc/nginx/sites-available/velo-api /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.velohub.app;  # ← change to your subdomain

    # Redirect HTTP → HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:30080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Body size for file uploads via MinIO
        client_max_body_size 50M;
    }
}

