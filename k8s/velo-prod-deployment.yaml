apiVersion: apps/v1
kind: Deployment
metadata:
  name: velo-api
  namespace: velo
  labels:
    app: velo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: velo-api
  template:
    metadata:
      labels:
        app: velo-api
    spec:
      # This secret must be created with kubectl create secret docker-registry regcred ...
      imagePullSecrets:
        - name: regcred
      containers:
        - name: velo-api
          # Image hosted on GitHub Container Registry — change owner/name/tag if needed
          image: ghcr.io/velocouriersvc/velo-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: velo-config
            - secretRef:
                name: velo-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Startup can take a while: image pull + TypeORM schema sync + boot seeds.
          # The startupProbe holds off liveness/readiness (and prevents a mid-boot
          # liveness kill / crash loop) until the app is actually listening.
          # 30 x 10s = up to 300s allowed for first byte.
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
      restartPolicy: Always
