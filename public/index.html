<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velo Auth Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; }
        .container { border: 1px solid #ccc; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        input, button { padding: 0.5rem; margin: 0.5rem 0; width: 100%; box-sizing: border-box; }
        code { background: #f4f4f4; padding: 0.2rem 0.5rem; border-radius: 4px; display: block; white-space: pre-wrap; word-break: break-all; }
        .hidden { display: none; }
    </style>
</head>
<body>
    
    <h1>Velo Backend Auth Test</h1>

    <div class="container" id="config-section">
        <h2>1. Configuration</h2>
        <input type="text" id="supaUrl" placeholder="Supabase URL">
        <input type="text" id="supaKey" placeholder="Supabase Anon Key">
        <button onclick="initSupabase()">Initialize Supabase</button>
    </div>

    <div class="container hidden" id="auth-section">
        <h2>2. Authentication</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="signUp()">Sign Up</button>
        <button onclick="signIn()">Sign In</button>
        <button onclick="signOut()">Sign Out</button>
        <div id="user-display"></div>
    </div>

    <div class="container hidden" id="sync-section">
        <h2>3. Backend Sync</h2>
        <p>Click to sync the authenticated user with the Velo backend.</p>
        <button onclick="syncUser()">Sync User with Backend</button>
        <h3>Result:</h3>
        <code id="sync-result">Waiting...</code>
    </div>

    <script>
        let supabase;

        function initSupabase() {
            const url = document.getElementById('supaUrl').value;
            const key = document.getElementById('supaKey').value;
            if (!url || !key) return alert('Please enter URL and Key');
            
            supabase = window.supabase.createClient(url, key);
            document.getElementById('config-section').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
            checkUser();
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            updateUserDisplay(user);
        }

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else {
                alert('Check email for confirmation link!');
                updateUserDisplay(data.user);
            }
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else updateUserDisplay(data.user);
        }

        async function signOut() {
            await supabase.auth.signOut();
            updateUserDisplay(null);
        }

        function updateUserDisplay(user) {
            const display = document.getElementById('user-display');
            const syncSection = document.getElementById('sync-section');
            if (user) {
                display.innerHTML = `<p>Logged in as: <strong>${user.email}</strong> (UID: ${user.id})</p>`;
                syncSection.classList.remove('hidden');
            } else {
                display.innerHTML = '<p>Not logged in</p>';
                syncSection.classList.add('hidden');
            }
        }

        async function syncUser() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return alert('No active session');

            const token = session.access_token;
            const resultEl = document.getElementById('sync-result');
            resultEl.textContent = 'Syncing...';

            try {
                const response = await fetch('/api/v1/auth/sync', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                resultEl.textContent = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
